stages:
  - deploy

deploy-on-tag:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
  before_script:
    - apk add --no-cache openssh docker-cli
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host $SSH_HOST\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
  script:
    - echo "⚙️ Deploying tag $CI_COMMIT_TAG to $SSH_HOST"
    - ssh $SSH_USER@$SSH_HOST <<EOF
        set -e

        docker stop pashmak || true
        docker rm pashmak || true

        mkdir -p /root/pashmak
        cd /root/pashmak

        if [ ! -d .git ]; then
          git clone git@hamgit.ir:tahlil/frontend/website.git .
        else
          git fetch --all
        fi

        git checkout -f tags/$CI_COMMIT_TAG

        docker build -t pashmak:$CI_COMMIT_TAG .
        docker run -d --name pashmak -p 5173:5173 pashmak:$CI_COMMIT_TAG
      EOF
